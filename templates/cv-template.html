<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{NAME}} — CV</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  body {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 13px;
    line-height: 1.45;
    color: #000000;
    background: #ffffff;
  }

  .page {
    width: 100%;
    max-width: {{PAGE_WIDTH}};
    margin: 0 auto;
    padding: 28px 48px 24px;
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    margin-bottom: 12px;
  }

  .header h1 {
    font-size: 18px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #000000;
    margin-bottom: 3px;
  }

  .header-title {
    font-size: 11px;
    color: #000000;
    margin-bottom: 5px;
  }

  .contact-row {
    font-size: 10px;
    color: #000000;
  }

  .contact-row a { color: #000000; text-decoration: none; }

  /* ── SECTIONS ── */
  .section { margin-bottom: 11px; }

  .section-title {
    font-size: 11px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #000000;
    border-bottom: 1px solid #000000;
    padding-bottom: 2px;
    margin-bottom: 6px;
  }

  /* ── SUMMARY ── */
  .summary-text {
    font-size: 12px;
    line-height: 1.5;
    color: #000000;
  }

  /* ── COMPETENCIES ── */
  .competencies-text {
    font-size: 12px;
    line-height: 1.45;
    color: #000000;
  }

  /* ── EXPERIENCE ── */
  .job { margin-bottom: 9px; }

  .job-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 0;
  }

  .job-company {
    font-size: 13px;
    font-weight: bold;
    color: #000000;
  }

  .job-period {
    font-size: 11px;
    color: #000000;
    white-space: nowrap;
    font-style: italic;
  }

  .job-role {
    font-size: 12px;
    font-weight: bold;
    color: #000000;
    margin-bottom: 2px;
  }

  .job-location {
    font-size: 11px;
    color: #000000;
    font-weight: normal;
  }

  .job ul { padding-left: 16px; margin-top: 3px; }

  .job li {
    font-size: 12px;
    line-height: 1.45;
    color: #000000;
    margin-bottom: 2px;
    list-style-type: disc;
  }

  /* ── PROJECTS ── */
  .project { margin-bottom: 8px; }

  .project-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 1px;
  }

  .project-title {
    font-size: 12px;
    font-weight: bold;
    color: #000000;
  }

  .project-context {
    font-size: 11px;
    color: #000000;
    font-style: italic;
    white-space: nowrap;
  }

  .project ul { padding-left: 16px; margin-top: 2px; }

  .project li {
    font-size: 12px;
    line-height: 1.45;
    color: #000000;
    margin-bottom: 2px;
    list-style-type: disc;
  }

  .project-tech {
    font-size: 11px;
    color: #000000;
    margin-top: 2px;
  }

  /* ── EDUCATION ── */
  .edu-item { margin-bottom: 6px; }

  .edu-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
  }

  .edu-degree {
    font-weight: bold;
    font-size: 12px;
    color: #000000;
  }

  .edu-school {
    font-size: 12px;
    color: #000000;
  }

  .edu-year {
    font-size: 11px;
    color: #000000;
    white-space: nowrap;
    font-style: italic;
  }

  .edu-desc {
    font-size: 11px;
    color: #000000;
    margin-top: 1px;
    line-height: 1.4;
  }

  /* ── SKILLS ── */
  .skill-row { margin-bottom: 3px; font-size: 12px; color: #000000; }
  .skill-category { font-weight: bold; color: #000000; }

  /* ── PRINT ── */
  @media print {
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .page { padding: 24px 44px 20px; }
  }

  .avoid-break, .job, .project, .edu-item {
    break-inside: avoid;
    page-break-inside: avoid;
  }
</style>
</head>
<body>
<div class="page">

  <div class="header avoid-break">
    <h1>{{NAME}}</h1>
    <div class="header-title">{{TITLE}}</div>
    <div class="contact-row">
      {{EMAIL}} | {{PHONE}} | <a href="{{LINKEDIN_URL}}">{{LINKEDIN_DISPLAY}}</a> | {{LOCATION}}
    </div>
  </div>

  <div class="section avoid-break">
    <div class="section-title">Professional Summary</div>
    <div class="summary-text">{{SUMMARY}}</div>
  </div>

  <div class="section avoid-break">
    <div class="section-title">Core Competencies</div>
    <div class="competencies-text">{{COMPETENCIES}}</div>
  </div>

  <div class="section">
    <div class="section-title">Work Experience</div>
    {{EXPERIENCE}}
  </div>

  <div class="section">
    <div class="section-title">Projects</div>
    {{PROJECTS}}
  </div>

  <div class="section avoid-break">
    <div class="section-title">Education</div>
    {{EDUCATION}}
  </div>

  <div class="section avoid-break">
    <div class="section-title">Skills</div>
    {{SKILLS}}
  </div>

</div>
</body>
</html>

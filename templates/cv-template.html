<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{NAME}} — CV</title>
<style>
  @font-face {
    font-family: 'Space Grotesk';
    src: url('./fonts/space-grotesk-latin.woff2') format('woff2');
    font-weight: 300 700;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }
  @font-face {
    font-family: 'Space Grotesk';
    src: url('./fonts/space-grotesk-latin-ext.woff2') format('woff2');
    font-weight: 300 700;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0100-02AF, U+0304, U+0308, U+0329, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
  }
  @font-face {
    font-family: 'DM Sans';
    src: url('./fonts/dm-sans-latin.woff2') format('woff2');
    font-weight: 100 1000;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }
  @font-face {
    font-family: 'DM Sans';
    src: url('./fonts/dm-sans-latin-ext.woff2') format('woff2');
    font-weight: 100 1000;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0100-02AF, U+0304, U+0308, U+0329, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  body {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    line-height: 1.5;
    color: #1a1a2e;
    background: #ffffff;
  }

  .page {
    width: 100%;
    max-width: {{PAGE_WIDTH}};
    margin: 0 auto;
    padding: 2px 0;
  }

  /* ── HEADER ── */
  .header {
    background: #1a1a2e;
    padding: 22px 24px 18px;
    margin-bottom: 20px;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 6px;
  }

  .header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: -0.01em;
    line-height: 1.1;
  }

  .header-institution {
    text-align: right;
    flex-shrink: 0;
  }

  .header-institution .inst-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10.5px;
    font-weight: 600;
    color: hsl(187, 74%, 65%);
    line-height: 1.4;
  }

  .header-institution .inst-degree {
    font-size: 9.5px;
    color: rgba(255,255,255,0.6);
    line-height: 1.4;
  }

  .header-title {
    font-size: 11px;
    color: hsl(187, 74%, 65%);
    margin-bottom: 10px;
    letter-spacing: 0.01em;
  }

  .header-gradient {
    height: 1.5px;
    background: linear-gradient(to right, hsl(187, 74%, 45%), hsl(270, 70%, 55%));
    border-radius: 1px;
    margin-bottom: 10px;
  }

  .contact-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 12px;
    font-size: 10px;
    color: rgba(255,255,255,0.7);
  }

  .contact-row a { color: rgba(255,255,255,0.7); text-decoration: none; }
  .contact-row .separator { color: rgba(255,255,255,0.3); }

  /* ── SECTIONS ── */
  .section { margin-bottom: 16px; padding: 0 2px; }

  .section-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: hsl(187, 74%, 32%);
    border-bottom: 1.5px solid #e2e2e2;
    padding-bottom: 4px;
    margin-bottom: 10px;
  }

  /* ── SUMMARY ── */
  .summary-text {
    font-size: 11px;
    line-height: 1.7;
    color: #2f2f2f;
  }

  /* ── COMPETENCIES ── */
  .competencies-grid { display: flex; flex-wrap: wrap; gap: 7px; }

  .competency-tag {
    font-size: 10px;
    font-weight: 500;
    color: hsl(187, 74%, 28%);
    background: hsl(187, 40%, 95%);
    padding: 3px 9px;
    border-radius: 3px;
    border: 1px solid hsl(187, 40%, 88%);
  }

  /* ── EXPERIENCE ── */
  .job { margin-bottom: 14px; }

  .job-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 2px;
  }

  .job-company {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: hsl(270, 70%, 45%);
  }

  .job-period { font-size: 10px; color: #777; white-space: nowrap; }

  .job-role {
    font-size: 10.5px;
    font-weight: 600;
    color: #333;
    margin-bottom: 5px;
  }

  .job-location { font-size: 10px; color: #888; font-weight: 400; }

  .job ul { padding-left: 16px; margin-top: 5px; }

  .job li {
    font-size: 10.5px;
    line-height: 1.6;
    color: #333;
    margin-bottom: 3px;
  }

  .job li strong { font-weight: 600; color: #1a1a2e; }

  /* ── PROJECTS ── */
  .project { margin-bottom: 11px; }

  .project-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 3px; }

  .project-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: hsl(270, 70%, 45%);
  }

  .project-badge {
    font-size: 9px;
    font-weight: 500;
    color: hsl(187, 74%, 32%);
    background: hsl(187, 40%, 95%);
    padding: 1px 6px;
    border-radius: 2px;
  }

  .project ul { padding-left: 16px; margin-top: 3px; }

  .project li {
    font-size: 10.5px;
    line-height: 1.55;
    color: #444;
    margin-bottom: 3px;
  }

  .project li strong { font-weight: 600; color: #1a1a2e; }

  .project-tech { font-size: 9.5px; color: #888; margin-top: 3px; }

  /* ── EDUCATION ── */
  .edu-item { margin-bottom: 8px; }

  .edu-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
  }

  .edu-degree { font-weight: 600; font-size: 11px; color: #333; }
  .edu-school { color: hsl(270, 70%, 45%); font-weight: 500; }
  .edu-year { font-size: 10px; color: #777; white-space: nowrap; }
  .edu-desc { font-size: 10px; color: #666; margin-top: 2px; line-height: 1.5; }

  /* ── SKILLS ── */
  .skill-row { margin-bottom: 5px; font-size: 10.5px; color: #444; }
  .skill-category { font-weight: 600; color: #333; }

  /* ── PRINT ── */
  @media print {
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .page { padding: 0; }
  }

  .avoid-break, .job, .project, .edu-item {
    break-inside: avoid;
    page-break-inside: avoid;
  }
</style>
</head>
<body>
<div class="page">

  <div class="header avoid-break">
    <div class="header-top">
      <div>
        <h1>{{NAME}}</h1>
      </div>
      <div class="header-institution">
        <div class="inst-name">{{INSTITUTION}}</div>
        <div class="inst-degree">{{DEGREE}}</div>
        <div class="inst-degree">{{INST_LOCATION}}</div>
      </div>
    </div>
    <div class="header-title">{{TITLE}}</div>
    <div class="header-gradient"></div>
    <div class="contact-row">
      <span>{{EMAIL}}</span>
      <span class="separator">•</span>
      <span>{{PHONE}}</span>
      <span class="separator">•</span>
      <a href="{{LINKEDIN_URL}}">{{LINKEDIN_DISPLAY}}</a>
      <span class="separator">•</span>
      <span>{{LOCATION}}</span>
    </div>
  </div>

  <div class="section avoid-break">
    <div class="section-title">Professional Summary</div>
    <div class="summary-text">{{SUMMARY}}</div>
  </div>

  <div class="section">
    <div class="section-title">Core Competencies</div>
    <div class="competencies-grid">{{COMPETENCIES}}</div>
  </div>

  <div class="section">
    <div class="section-title">Work Experience</div>
    {{EXPERIENCE}}
  </div>

  <div class="section">
    <div class="section-title">Projects</div>
    {{PROJECTS}}
  </div>

  <div class="section avoid-break">
    <div class="section-title">Education</div>
    {{EDUCATION}}
  </div>

  <div class="section avoid-break">
    <div class="section-title">Skills</div>
    {{SKILLS}}
  </div>

</div>
</body>
</html>

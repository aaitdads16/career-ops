<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{NAME}} — Cover Letter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  body {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 11px;
    line-height: 1.6;
    color: #000000;
    background: #ffffff;
  }

  .page {
    width: 100%;
    max-width: {{PAGE_WIDTH}};
    margin: 0 auto;
    padding: 30px 40px 30px;
  }

  /* ── HEADER — matches resume style exactly ── */
  .header {
    text-align: center;
    padding-bottom: 10px;
    border-bottom: 1.5px solid #000000;
    margin-bottom: 22px;
  }

  .header h1 {
    font-size: 18px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #000000;
    margin-bottom: 3px;
  }

  .header-title {
    font-size: 11px;
    color: #000000;
    margin-bottom: 5px;
  }

  .contact-row {
    font-size: 10px;
    color: #000000;
  }

  .contact-row a { color: #000000; text-decoration: none; }

  /* ── DATE + RECIPIENT ── */
  .meta-block {
    margin-bottom: 20px;
  }

  .date {
    font-size: 11px;
    color: #000000;
    margin-bottom: 14px;
  }

  .recipient-role {
    font-size: 11px;
    font-weight: bold;
    color: #000000;
    margin-bottom: 1px;
  }

  .recipient-company {
    font-size: 11px;
    color: #000000;
  }

  /* ── SALUTATION ── */
  .salutation {
    font-size: 11px;
    color: #000000;
    margin-bottom: 14px;
    margin-top: 18px;
  }

  /* ── LETTER BODY ── */
  .letter-body {
    font-size: 11px;
    line-height: 1.75;
    color: #000000;
  }

  .letter-body p {
    margin-bottom: 13px;
    text-align: left;
  }

  .letter-body p:last-child {
    margin-bottom: 0;
  }

  .letter-body strong {
    font-weight: bold;
    color: #000000;
  }

  /* ── CLOSING ── */
  .closing {
    margin-top: 22px;
  }

  .sign-off {
    font-size: 11px;
    color: #000000;
    margin-bottom: 20px;
  }

  .sig-name {
    font-size: 12px;
    font-weight: bold;
    color: #000000;
    letter-spacing: 0.02em;
  }

  /* ── PRINT ── */
  @media print {
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .page { padding: 26px 36px 26px; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <h1>{{NAME}}</h1>
    <div class="header-title">{{TITLE}}</div>
    <div class="contact-row">
      {{EMAIL}} | {{PHONE}} | <a href="{{LINKEDIN_URL}}">{{LINKEDIN_DISPLAY}}</a> | {{LOCATION}}
    </div>
  </div>

  <div class="meta-block">
    <div class="date">{{DATE}}</div>
    <div class="recipient-role">{{RECIPIENT_ROLE}}</div>
    <div class="recipient-company">{{COMPANY_FULL}}</div>
  </div>

  <div class="salutation">{{SALUTATION}}</div>

  <div class="letter-body">{{LETTER_BODY}}</div>

  <div class="closing">
    <div class="sign-off">Sincerely,</div>
    <div class="sig-name">{{NAME}}</div>
  </div>

</div>
</body>
</html>

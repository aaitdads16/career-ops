name: Internship Finder

on:
  # ── Automatic schedule (Europe/Paris = UTC+2 in summer, UTC+1 in winter) ──
  schedule:
    - cron: '0 6 * * *'    # 8:00 AM Paris (CEST Apr–Oct)
    - cron: '0 18 * * *'   # 8:00 PM Paris (CEST Apr–Oct)
  # ── Manual trigger from GitHub UI (Actions tab → Run workflow) ────────────
  workflow_dispatch:

jobs:
  run-finder:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # commit tracker + dashboard back to repo
      pages: write       # deploy to GitHub Pages
      id-token: write    # OIDC token for Pages deployment

    steps:
      # ── 1. Check out the repo ────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Set up Python 3.11 ───────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install Python dependencies ─────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 3b. Install Playwright (Python) for Crawl4AI scrapers ───────────────
      - name: Install Playwright Chromium (Python)
        run: python -m playwright install chromium --with-deps

      # ── 4. Set up Node.js (for PDF generation) ──────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 5. Install Node.js dependencies + Playwright browser ────────────────
      - name: Install Node dependencies & Playwright Chromium
        run: |
          npm install
          npx playwright install chromium --with-deps

      # ── 6. Create output directories + restore data from repo ───────────────
      - name: Prepare folders
        run: |
          mkdir -p resumes cover_letters data tmp docs
          touch data/seen_job_ids.txt
          touch data/token_usage.json
          touch data/seen_fingerprints.txt
          touch data/telegram_offset.txt
          touch data/scored_jobs.jsonl || true

      # ── 7. Gmail sync — auto-detect application status changes ────────────────
      - name: Sync Gmail statuses
        if: ${{ vars.GMAIL_ENABLED == 'true' }}
        env:
          GMAIL_TOKEN_JSON:   ${{ secrets.GMAIL_TOKEN_JSON }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          OUTPUT_DIR:         ${{ github.workspace }}
          GITHUB_ACTIONS:     "true"
        run: |
          python3 -c "
          import logging
          logging.basicConfig(level=logging.INFO, format='%(asctime)s %(levelname)s %(message)s')
          from gmail_tracker import sync_gmail_statuses
          changes = sync_gmail_statuses(days_back=3)
          print(f'Gmail sync: {len(changes)} status change(s).')
          "
        continue-on-error: true   # don't fail the whole run if Gmail errors

      # ── 8. Run the main pipeline ─────────────────────────────────────────────
      - name: Run Internship Finder
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          APIFY_API_TOKEN:    ${{ secrets.APIFY_API_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          OUTPUT_DIR:         ${{ github.workspace }}
          GITHUB_ACTIONS:     "true"
        run: python main.py

      # ── 9. Generate dashboard ────────────────────────────────────────────────
      - name: Generate dashboard
        env:
          OUTPUT_DIR: ${{ github.workspace }}
        run: |
          python3 -c "
          import logging
          logging.basicConfig(level=logging.INFO, format='%(asctime)s %(levelname)s %(message)s')
          from dashboard_generator import generate_dashboard
          out = generate_dashboard()
          print(f'Dashboard: {out}')
          "
        continue-on-error: true

      # ── 10. Commit all data + dashboard back to repo ─────────────────────────
      - name: Commit updates
        if: always()
        run: |
          git config user.email "internship-finder-bot@users.noreply.github.com"
          git config user.name  "Internship Finder Bot"
          git add --force \
            data/seen_job_ids.txt \
            data/token_usage.json \
            data/seen_fingerprints.txt \
            data/telegram_offset.txt \
            data/scored_jobs.jsonl \
            data/gmail_seen_ids.txt \
            data/gmail_last_sync.txt \
            data/skills_gap_advice.txt \
            docs/index.html \
            || true
          git add data/tracker.xlsx || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: update tracker + dashboard $(date +'%Y-%m-%d %H:%M UTC') [skip ci]"
            git push
          else
            echo "No data changes to commit."
          fi

      # ── 11. Deploy dashboard to GitHub Pages ─────────────────────────────────
      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      # ── 12. Upload generated files as workflow artifacts ─────────────────────
      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: internship-docs-${{ github.run_number }}
          path: |
            resumes/
            cover_letters/
            data/tracker.xlsx
            data/run.log
          retention-days: 14
          if-no-files-found: ignore

  # ── Deploy GitHub Pages ───────────────────────────────────────────────────
  deploy-pages:
    needs: run-finder
    runs-on: ubuntu-latest
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

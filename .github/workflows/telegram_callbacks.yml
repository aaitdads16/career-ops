name: Telegram Callback Bot

# Runs every 15 minutes to process:
#   - "✅ Mark as Applied" button taps
#   - Deferred apply queue (timing-race fix)
#   - Bot commands: /status /stats /pause /resume /search /budget /followup /setstatus /help

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes, 24/7
  workflow_dispatch:          # manual trigger from GitHub UI

jobs:
  process-callbacks:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # needed to commit offset + tracker updates

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests openpyxl python-dotenv anthropic

      - name: Prepare data folder
        run: |
          mkdir -p data docs
          touch data/telegram_offset.txt
          touch data/tracker.xlsx    || true
          touch data/token_usage.json || true

      - name: Process callbacks + commands
        env:
          TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:          ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_TOTAL_CREDIT_USD: ${{ secrets.ANTHROPIC_TOTAL_CREDIT_USD }}
          OUTPUT_DIR:                ${{ github.workspace }}
          GITHUB_ACTIONS:            "true"
        run: |
          python3 -c "
          import logging
          logging.basicConfig(level=logging.INFO, format='%(asctime)s %(levelname)s %(message)s')
          from callback_handler import process_pending_callbacks
          n = process_pending_callbacks()
          print(f'Processed {n} update(s).')
          "

      - name: Commit changes
        run: |
          git config user.email "career-ops-bot@users.noreply.github.com"
          git config user.name  "Career Ops Bot"
          for f in \
            data/telegram_offset.txt \
            data/tracker.xlsx \
            data/pending_apply.json \
            data/applications.json \
            data/pause_until.txt \
            data/search_trigger.json; do
            git add --force "$f" 2>/dev/null || true
          done
          if ! git diff --staged --quiet; then
            git commit -m "chore: callback sync $(date +'%Y-%m-%d %H:%M UTC') [skip ci]"
            for attempt in 1 2 3; do
              git push && break
              echo "Push attempt $attempt failed — retrying..."
              git pull --rebase origin main
            done
          else
            echo "No changes."
          fi

name: Telegram Callback Bot

# Runs every 15 minutes to process "✅ Mark as Applied" button taps.
# This replaces the need to run bot.py locally — fully automatic.

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes, 24/7
  workflow_dispatch:          # manual trigger from GitHub UI

jobs:
  process-callbacks:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # needed to commit offset + tracker updates

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests openpyxl python-dotenv

      - name: Prepare data folder
        run: |
          mkdir -p data
          touch data/telegram_offset.txt
          touch data/tracker.xlsx || true

      - name: Process pending callbacks
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          OUTPUT_DIR:         ${{ github.workspace }}
          GITHUB_ACTIONS:     "true"
        run: |
          python3 -c "
          import logging
          logging.basicConfig(level=logging.INFO, format='%(asctime)s %(levelname)s %(message)s')
          from callback_handler import process_pending_callbacks
          n = process_pending_callbacks()
          print(f'Processed {n} callback(s).')
          "

      - name: Commit changes
        run: |
          git config user.email "career-ops-bot@users.noreply.github.com"
          git config user.name  "Career Ops Bot"
          git add --force data/telegram_offset.txt data/tracker.xlsx || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: callback sync $(date +'%Y-%m-%d %H:%M UTC') [skip ci]"
            git push
          else
            echo "No changes."
          fi
